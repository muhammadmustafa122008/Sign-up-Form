<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign-up Form</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
     <div class="left">
        <div class="banner">
        <div class="banner-image"></div>
        <div class="banner-text">Odin</div>
       </div>
      <div class="banner-credit">Photo by <a href="https://unsplash.com/photos/green-leaf-plant-in-close-up-photography-25xggax4bSA">Haile west</a> on <a href="https://unsplash.com/">unsplash</a></div>
   </div>
     <div class="right">
        <div class="form-heading">
        This is not a real online service! You know you need something 
        like this in your life to help you realize your deepest dreams. <br>
        Sign up <i>now</i> to get started.
        <br>
        <br>        
        You <i>know</i> you want to.
        </div>
        <form action="" method="post" class="form-main"> 
            <legend>Let's do this!</legend>
            <div class="form-grid">
            <div class="form-row">
                <label for="name">FIRST NAME</label>
                <input type="text" name="username" id="username" >
            </div>
            <div class="form-row">
                <label for="second-name" >SECOND NAME</label>
                <input type="text" name="username" id="username" >
            </div>
            <div class="form-row">
                <label for="email">EMAIL</label>
                <input type="email" name="email" id="email">
            </div>
            <div class="form-row">
                <label for="Phone Number"> PHONE NUMBER</label>
                <input type="tel" name="phone-number" id="tel">
            </div>
            <div class="form-row">
                <label for="password">PASSWORD</label>
                <input type="password" name="password" id="password">
            </div>
            <div class="form-row">
                <label for="password-conformation">CONFIRM PASSWORD</label>
                <input type="password" name="password-conformation" id="password-conformation">
            </div>
            </div>
            <button type="submit">Create Account</button>
        </form>
        <div class="Account">
            Already have an account?  <a href="#" class="log-in">Log in</a>
        </div>
     </div>
     
</body>

</html>
